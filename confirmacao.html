<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmação do Pedido – Sucrée Confeitaria</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');

  *{box-sizing:border-box;margin:0;padding:0}

  body {
    font-family:'Lato',sans-serif;
    background:#1a0e00;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding:20px 16px;
  }

  .screen-actions {
    width:100%;
    max-width:480px;
    display:flex;
    gap:10px;
    margin-bottom:16px;
  }

  .btn-action {
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-family:'Lato',sans-serif;
    font-size:14px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }
  .btn-share { background:#c9a84c; color:#1a0800; }
  .btn-print { background:#3a2800; color:#c9a84c; border:1px solid #c9a84c44; }
  .btn-back { background:#2a1800; color:#b89040; border:1px solid #b8904044; }

  /* PAPEL TIMBRADO */
  .papel {
    width:100%;
    max-width:480px;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 8px 40px rgba(0,0,0,0.5);
  }

  .papel-header {
    background: linear-gradient(135deg, #2c1800 0%, #3d2200 50%, #2c1800 100%);
    padding:28px 24px 20px;
    text-align:center;
    position:relative;
  }
  .papel-header::after {
    content:'';
    position:absolute;
    bottom:0; left:0; right:0; height:3px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
  }

  .logo-papel {
    width:80px;
    height:80px;
    margin:0 auto 12px;
  }

  .marca-nome {
    font-family:'Playfair Display',serif;
    font-size:28px;
    color:#c9a84c;
    letter-spacing:3px;
    line-height:1;
  }

  .marca-sub {
    font-size:10px;
    letter-spacing:4px;
    color:#b89040aa;
    margin-top:4px;
  }

  .divider-gold {
    display:flex;
    align-items:center;
    gap:8px;
    margin:14px 24px 0;
  }
  .divider-gold::before,.divider-gold::after {
    content:'';flex:1;height:0.5px;background:#c9a84c66;
  }
  .divider-gold span { color:#c9a84c; font-size:10px; }

  .papel-body { padding:20px 24px; }

  .pedido-titulo {
    font-family:'Playfair Display',serif;
    font-size:16px;
    color:#2c1800;
    text-align:center;
    margin-bottom:4px;
  }

  .pedido-num {
    text-align:center;
    font-size:11px;
    color:#888;
    margin-bottom:16px;
    letter-spacing:1px;
  }

  .info-row {
    display:flex;
    justify-content:space-between;
    padding:7px 0;
    border-bottom:0.5px solid #eee;
    font-size:13px;
  }
  .info-row .label { color:#888; font-weight:400; }
  .info-row .value { color:#2c1800; font-weight:700; text-align:right; max-width:60%; }

  .secao-titulo {
    font-family:'Playfair Display',serif;
    font-size:13px;
    color:#2c1800;
    margin:18px 0 8px;
    padding-bottom:4px;
    border-bottom:1px solid #c9a84c44;
    letter-spacing:0.5px;
  }

  .item-linha {
    display:flex;
    justify-content:space-between;
    font-size:12px;
    padding:4px 0;
    color:#444;
  }
  .item-linha .item-nome { color:#333; }
  .item-linha .item-val { color:#2c1800; font-weight:700; }

  .obs-box {
    background:#fdf8f0;
    border-left:3px solid #c9a84c;
    border-radius:0 6px 6px 0;
    padding:8px 12px;
    font-size:12px;
    color:#555;
    margin-top:8px;
    font-style:italic;
  }

  .inspiracao-aviso {
    background:#fff8e6;
    border:1px solid #c9a84c55;
    border-radius:6px;
    padding:8px 12px;
    font-size:11px;
    color:#7a5c00;
    margin-top:8px;
    text-align:center;
  }

  .total-box {
    background: linear-gradient(135deg, #2c1800, #3d2200);
    border-radius:8px;
    padding:14px 18px;
    margin-top:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .total-label { color:#c9a84caa; font-size:12px; letter-spacing:1px; }
  .total-valor { color:#c9a84c; font-size:22px; font-family:'Playfair Display',serif; font-weight:700; }

  .entrega-box {
    margin-top:14px;
    background:#f9f9f9;
    border-radius:8px;
    padding:12px 14px;
  }

  .entrega-tipo {
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    color:#2c1800;
    font-weight:700;
    margin-bottom:6px;
  }

  .entrega-endereco {
    font-size:11px;
    color:#555;
    line-height:1.6;
  }

  .maps-link {
    display:inline-flex;
    align-items:center;
    gap:5px;
    margin-top:6px;
    color:#c9a84c;
    font-size:11px;
    font-weight:700;
    text-decoration:none;
  }

  .papel-footer {
    background:#2c1800;
    padding:14px 24px;
    text-align:center;
  }
  .footer-msg {
    font-size:11px;
    color:#c9a84c88;
    font-style:italic;
    line-height:1.6;
  }
  .footer-contato {
    font-size:10px;
    color:#c9a84c55;
    margin-top:6px;
    letter-spacing:0.5px;
  }

  @media print {
    body { background:#fff; padding:0; }
    .screen-actions { display:none; }
    .papel { box-shadow:none; border-radius:0; max-width:100%; }
  }
</style>
</head>
<body>

<div class="screen-actions">
  <button class="btn-action btn-back" onclick="history.back()">← Voltar</button>
  <button class="btn-action btn-share" onclick="compartilhar()">📤 Enviar</button>
  <button class="btn-action btn-print" onclick="window.print()">🖨️ Imprimir</button>
</div>

<div class="papel" id="papel-pedido">

  <div class="papel-header">
    <!-- Logo SVG inline -->
    <svg class="logo-papel" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="40" cy="38" rx="26" ry="32" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
      <text x="40" y="30" text-anchor="middle" font-family="serif" font-size="24" fill="#c9a84c" font-style="italic">S</text>
      <!-- fouet/batedor -->
      <line x1="40" y1="32" x2="40" y2="58" stroke="#c9a84c" stroke-width="1.2"/>
      <ellipse cx="40" cy="52" rx="5" ry="7" fill="none" stroke="#c9a84c" stroke-width="0.8"/>
      <line x1="37" y1="46" x2="43" y2="52" stroke="#c9a84c" stroke-width="0.6"/>
      <line x1="43" y1="46" x2="37" y2="52" stroke="#c9a84c" stroke-width="0.6"/>
    </svg>

    <div class="marca-nome">Sucrée</div>
    <div class="marca-sub">CONFEITARIA</div>
    <div class="divider-gold"><span>✦</span></div>
  </div>

  <div class="papel-body" id="corpo-pedido">
    <!-- Preenchido via JS -->
  </div>

  <div class="papel-footer">
    <div class="footer-msg">Feito com amor e dedicação em cada detalhe ✨</div>
    <div class="footer-contato">Sucrée Confeitaria · Vitória - ES</div>
  </div>

</div>

<script>
// Lê dados do localStorage
const pedido = JSON.parse(localStorage.getItem('pedido_sucree') || '{}');

function numPedido() {
  const d = new Date();
  return `#${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(Math.floor(Math.random()*999)+1).padStart(3,'0')}`;
}

function formatarData(data) {
  if (!data) return '–';
  const [y,m,d] = data.split('-');
  return `${d}/${m}/${y}`;
}

function formatarMoeda(v) {
  return 'R$ ' + parseFloat(v||0).toFixed(2).replace('.',',');
}

function renderizar() {
  const corpo = document.getElementById('corpo-pedido');
  const num = numPedido();
  const dataHoje = new Date().toLocaleDateString('pt-BR');
  const isRetirada = pedido.entrega === 'retirar';

  const enderecoHTML = isRetirada ? `
    <div class="entrega-box">
      <div class="entrega-tipo">📍 Retirada no local</div>
      <div class="entrega-endereco">
        Avenida Maruípe, nº 235<br>
        Edifício Orion, AP 102 – Bloco A<br>
        Bairro Santa Cecília<br>
        Vitória – ES · CEP 29.043-270
      </div>
      <a class="maps-link" href="https://www.google.com/maps/place/20%C2%B018'14.5%22S+40%C2%B019'22.7%22W/@-20.3040226,-40.325544,17z" target="_blank">
        📌 Ver no Google Maps
      </a>
    </div>` : `
    <div class="entrega-box">
      <div class="entrega-tipo">🛵 Entrega no endereço</div>
      <div class="entrega-endereco">${pedido.enderecoCliente || 'A combinar'}</div>
    </div>`;

  corpo.innerHTML = `
    <div class="pedido-titulo">Resumo do Pedido</div>
    <div class="pedido-num">${num} · ${dataHoje}</div>

    <div class="info-row"><span class="label">Cliente</span><span class="value">${pedido.nomeCliente||'–'}</span></div>
    <div class="info-row"><span class="label">Telefone</span><span class="value">${pedido.telefone||'–'}</span></div>
    <div class="info-row"><span class="label">Data de entrega</span><span class="value">${formatarData(pedido.dataEntrega)}</span></div>
    <div class="info-row"><span class="label">Horário</span><span class="value">${pedido.horario||'–'}</span></div>

    <div class="secao-titulo">🎂 Bolo</div>
    <div class="item-linha"><span class="item-nome">Tamanho</span><span class="item-val">${pedido.tamanho||'–'}</span></div>
    <div class="item-linha"><span class="item-nome">Porções estimadas</span><span class="item-val">${pedido.porcoes||'–'}</span></div>
    <div class="item-linha"><span class="item-nome">Recheio</span><span class="item-val">${pedido.recheio||'–'}</span></div>
    <div class="item-linha"><span class="item-nome">Cobertura</span><span class="item-val">${pedido.cobertura||'–'}</span></div>
    <div class="item-linha"><span class="item-nome">Tema / Decoração</span><span class="item-val">${pedido.tema||'–'}</span></div>
    ${pedido.andaresExtra ? `<div class="item-linha"><span class="item-nome">Andar extra</span><span class="item-val">${pedido.andaresExtra}</span></div>` : ''}
    ${pedido.topo ? `<div class="item-linha"><span class="item-nome">Topo de bolo</span><span class="item-val">${pedido.topo}</span></div>` : ''}

    <div class="inspiracao-aviso">
      ⚠️ As imagens de tema são apenas referência visual. O resultado final pode apresentar variações no estilo e acabamento.
    </div>

    ${pedido.observacoes ? `
    <div class="secao-titulo">📝 Observações</div>
    <div class="obs-box">${pedido.observacoes}</div>
    ` : ''}

    <div class="secao-titulo">🚚 Entrega / Retirada</div>
    ${enderecoHTML}

    <div class="total-box">
      <span class="total-label">TOTAL DO PEDIDO</span>
      <span class="total-valor">${formatarMoeda(pedido.valor)}</span>
    </div>
  `;
}

async function compartilhar() {
  try {
    const texto = `🎂 *Sucrée Confeitaria*\n\n✨ *Resumo do seu pedido:*\n\nCliente: ${pedido.nomeCliente||'–'}\nBolo: ${pedido.tamanho||'–'} · ${pedido.recheio||'–'}\nCobertura: ${pedido.cobertura||'–'}\nTema: ${pedido.tema||'–'}\nData: ${pedido.dataEntrega||'–'}\n\nEntrega: ${pedido.entrega === 'retirar' ? 'Retirada – Av. Maruípe, 235, AP 102, Santa Cecília, Vitória-ES' : 'Entrega no endereço'}\n\n💰 *Total: R$ ${parseFloat(pedido.valor||0).toFixed(2).replace('.',',')}*\n\n_Feito com amor em cada detalhe_ 🤍`;
    if (navigator.share) {
      await navigator.share({ title: 'Pedido Sucrée', text: texto });
    } else {
      await navigator.clipboard.writeText(texto);
      alert('Resumo copiado! Cole no WhatsApp do cliente.');
    }
  } catch(e) {}
}

renderizar();
</script>
</body>
</html>
