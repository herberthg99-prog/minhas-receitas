<script src="js/app-core.js"></script>
<script>
// Variáveis Globais de Estado do Pedido
let pedido = {
    tamanho: 0,
    precoBase: 0,
    massa: '',
    massaNome: '',
    recheios: [],
    cobertura: 'chantininho',
    coberturaNome: 'Chantininho',
    coberturaPreco: 0,
    decoracao: '',
    decoracaoNome: '',
    decoracaoPreco: 0,
    tema: '',
    ajudaTema: false,
    adicionais: [],
    adicionaisPreco: 0,
    total: 0
};

// Gerenciamento de Passos (Wizard)
function nextStep(current) {
    if (current === 0 && (!pedido.tamanho || !pedido.massa)) return;
    if (current === 1 && pedido.recheios.length === 0) return;
    if (current === 2 && !pedido.cobertura) return;
    if (current === 3 && !pedido.decoracao) return;

    document.getElementById(`step-${current}`).classList.remove('act');
    document.getElementById(`step-${current + 1}`).classList.add('act');
    
    // Atualiza barra de progresso
    document.getElementById(`pd-${current}`).classList.remove('active');
    document.getElementById(`pd-${current}`).classList.add('done');
    document.getElementById(`pl-${current}`).classList.remove('active');
    document.getElementById(`pl-${current}`).classList.add('done');
    
    document.getElementById(`pd-${current + 1}`).classList.add('active');
    document.getElementById(`pl-${current + 1}`).classList.add('active');

    if (current + 1 === 5) {
        renderizarResumo();
    }
}

function prevStep(current) {
    document.getElementById(`step-${current}`).classList.remove('act');
    document.getElementById(`step-${current - 1}`).classList.add('act');
    
    document.getElementById(`pd-${current}`).classList.remove('active');
    document.getElementById(`pl-${current}`).classList.remove('active');
    
    document.getElementById(`pd-${current - 1}`).classList.remove('done');
    document.getElementById(`pd-${current - 1}`).classList.add('active');
    document.getElementById(`pl-${current - 1}`).classList.remove('done');
    document.getElementById(`pl-${current - 1}`).classList.add('active');
}

// Configurações do Passo 0 (Tamanho e Massa)
function setModoTamanho(modo) {
    if (modo === 'sei') {
        document.getElementById('box-tamanhos').style.display = 'block';
        document.getElementById('box-convidados').style.display = 'none';
    } else {
        document.getElementById('box-tamanhos').style.display = 'none';
        document.getElementById('box-convidados').style.display = 'block';
    }
}

function sugerirTamanho() {
    const qtd = parseInt(document.getElementById('qtd-convidados').value);
    const box = document.getElementById('sugestao-box');
    const texto = document.getElementById('sugestao-texto');
    
    if (!qtd || qtd <= 0) {
        box.style.display = 'none';
        return;
    }

    box.style.display = 'block';
    if (qtd <= 3) {
        texto.innerText = "Aro 10 cm (Até 3 fatias)";
    } else if (qtd <= 10) {
        texto.innerText = "Aro 15 cm (Até 10 fatias)";
    } else if (qtd <= 20) {
        texto.innerText = "Aro 20 cm (Até 20 fatias)";
    } else if (qtd <= 30) {
        texto.innerText = "Aro 25 cm (Até 30 fatias)";
    } else {
        texto.innerText = "Aro 30 cm (Até 45 fatias)";
    }
}

function setTamanho(aro, precoTrad, precoPrem) {
    pedido.tamanho = aro;
    // O preço base inicial assume tradicional até que um recheio premium seja escolhido
    pedido.precoBase = precoTrad;
    pedido.precoTrad = precoTrad;
    pedido.precoPrem = precoPrem;

    document.querySelectorAll('.tamanho-btn').forEach(b => b.classList.remove('sel'));
    document.getElementById(`tam-${aro}`).classList.add('sel');
    document.getElementById('box-massa').style.display = 'block';
    verificarPasso0();
}

function setMassa(id, nome) {
    pedido.massa = id;
    pedido.massaNome = nome;
    document.querySelectorAll('#massas-container .opcao-btn').forEach(b => b.classList.remove('sel'));
    document.getElementById(`massa-${id}`).classList.add('sel');
    verificarPasso0();
}

function verificarPasso0() {
    const btn = document.getElementById('btn-next-0');
    if (pedido.tamanho && pedido.massa) {
        btn.removeAttribute('disabled');
    } else {
        btn.setAttribute('disabled', 'true');
    }
}

// Configurações do Passo 1 (Recheios)
function toggleRecheio(nome, tipo) {
    const index = pedido.recheios.findIndex(r => r.nome === nome);
    
    if (index > -1) {
        pedido.recheios.splice(index, 1);
    } else {
        if (pedido.recheios.length >= 2) {
            alert("Você pode escolher no máximo 2 recheios!");
            return;
        }
        pedido.recheios.push({ nome, tipo });
    }

    // Atualiza interface gráfica das tags
    document.querySelectorAll('.recheio-tag').forEach(tag => {
        if (tag.textContent === nome) {
            tag.classList.toggle('sel-1', index === -1);
        }
    });

    // Se houver algum recheio premium, altera o preço base do bolo para a tabela premium
    const temPremium = pedido.recheios.some(r => r.tipo === 'prem');
    if (temPremium) {
        pedido.precoBase = pedido.precoPrem;
        document.getElementById('alerta-recheio-prem').style.display = 'flex';
    } else {
        pedido.precoBase = pedido.precoTrad;
        document.getElementById('alerta-recheio-prem').style.display = 'none';
    }

    const btn = document.getElementById('btn-next-1');
    if (pedido.recheios.length > 0) {
        btn.removeAttribute('disabled');
    } else {
        btn.setAttribute('disabled', 'true');
    }
}

// Configurações do Passo 2 (Cobertura)
function setCobertura(id, nome) {
    pedido.cobertura = id;
    pedido.coberturaNome = nome;
    pedido.coberturaPreco = id === 'buttercream' ? 50 : 0;

    document.querySelectorAll('#step-2 .opcao-btn').forEach(b => b.classList.remove('sel'));
    document.getElementById(`cob-${id}`).classList.add('sel');
    document.getElementById('alerta-buttercream').style.display = id === 'buttercream' ? 'flex' : 'none';
    
    document.getElementById('btn-next-2').removeAttribute('disabled');
}

// Configurações do Passo 3 (Decoração e Adicionais)
function setDeco(id) {
    pedido.decoracao = id;
    if (id === 'espatulado') {
        pedido.decoracaoNome = "Apenas Espatulado";
        pedido.decoracaoPreco = 0;
        document.getElementById('tema-box').style.display = 'none';
    } else {
        pedido.decoracaoNome = "Temático + Topo do Bolo";
        pedido.decoracaoPreco = 45;
        document.getElementById('tema-box').style.display = 'block';
    }

    document.querySelectorAll('.deco-opcao').forEach(b => b.classList.remove('sel'));
    document.getElementById(`deco-${id}`).classList.add('sel');
}

function setAjudaTema(querAjuda) {
    pedido.ajudaTema = querAjuda;
    document.getElementById('ajuda-tema-box').style.display = querAjuda ? 'block' : 'none';
    
    const sim = document.getElementById('btn-ajuda-sim');
    const nao = document.getElementById('btn-ajuda-nao');
    
    if (querAjuda) {
        sim.style.background = '#9FE1CB';
        nao.style.background = '#f5f5f5';
    } else {
        sim.style.background = 'white';
        nao.style.background = '#ddd';
    }
}

function toggleExtra(id) {
    const item = document.getElementById(`extra-${id}`);
    const index = pedido.adicionais.indexOf(id);

    if (index > -1) {
        pedido.adicionais.splice(index, 1);
        pedido.adicionaisPreco -= 50;
        item.classList.remove('sel');
    } else {
        pedido.adicionais.push(id);
        pedido.adicionaisPreco += 50;
        item.classList.add('sel');
    }
}

// Renderização e Cálculo Final do Resumo
function renderizarResumo() {
    pedido.total = pedido.precoBase + pedido.coberturaPreco + pedido.decoracaoPreco + pedido.adicionaisPreco;
    
    // Se o usuário digitou um tema personalizado, salva no objeto antes de exibir
    if (pedido.decoracao === 'tematico') {
        pedido.tema = document.getElementById('tema-input').value.trim() || 'Não especificado';
    }

    // Se você tiver elementos de texto na div do resumo (Passo 5), adicione as vinculações aqui
    console.log("Resumo atualizado:", pedido);
}

// CORREÇÃO CRÍTICA DO WHATSAPP (LIVRE DE BUGS DE HEADER)
function notificarWhatsApp(dadosPedido) {
    console.log("Iniciando envio de dados para o WhatsApp...");

    // Cabeçalhos limpos e padronizados sem caracteres especiais
    const headersLimpos = {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
    };

    // Montagem do payload seguro
    const textoFormatado = `🎂 *Novo Pedido Sucrée!* 🎂\n\n` +
                           `• Tamanho: Aro ${pedido.tamanho} cm\n` +
                           `• Massa: ${pedido.massaNome}\n` +
                           `• Cobertura: ${pedido.coberturaNome}\n` +
                           `• Decoração: ${pedido.decoracaoNome}\n` +
                           (pedido.tema ? `• Tema: ${pedido.tema}\n` : '') +
                           `• Total: R$ ${pedido.total.toFixed(2)}`;

    const corpoRequisicao = {
        mensagem: textoFormatado
    };

    fetch('/api/notificar-whatsapp', { 
        method: 'POST',
        headers: headersLimpos, 
        body: JSON.stringify(corpoRequisicao)
    })
    .then(response => {
        if (!response.ok) throw new Error('Falha no servidor.');
        return response.json();
    })
    .then(data => {
        console.log("Notificação registrada:", data);
        abrirJanelaWhatsApp(textoFormatado);
    })
    .catch(error => {
        console.error("Modo segurança ativado devido a erro:", error);
        abrirJanelaWhatsApp(textoFormatado);
    });
}

function abrirJanelaWhatsApp(texto) {
    const numeroTelefone = "2799521314"; // Seu número configurado
    const linkFinal = `https://wa.me/55${numeroTelefone}?text=${encodeURIComponent(texto)}`;
    window.open(linkFinal, '_blank');
}
</script>
